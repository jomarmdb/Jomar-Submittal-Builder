name: Keep Jomar App Awake

on:
  schedule:
    # Runs every 4 hours (at minute 15 of the hour to avoid peak traffic)
    - cron: '15 */4 * * *'
  workflow_dispatch: # This adds the "Run workflow" button so you can test it

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Ping
        run: curl -ILs https://jomar-submittal-builder.streamlit.app/
