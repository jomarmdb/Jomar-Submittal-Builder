name: Keep Streamlit App Awake

on:
  schedule:
    # This runs every 6 hours (adjust as needed)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -I https://share.streamlit.io/jomarmdb/JVSPB6.py/main/main.py
