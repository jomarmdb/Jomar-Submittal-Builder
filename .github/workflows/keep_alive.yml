name: Keep Jomar App Awake

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit App
        run: |
          python - <<EOF
          import requests

          url = "https://jomar-submittal-builder.streamlit.app/"

          response = requests.get(url)

          print("Status Code:", response.status_code)
          print("App pinged successfully!")
          EOF
