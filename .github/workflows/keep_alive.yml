name: Streamlit Keep Alive

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: '0 */12 * * *'
  # This line creates the "Run workflow" button in the UI
  workflow_dispatch: 

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    # This permission is REQUIRED to push the heartbeat file
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Heartbeat
        run: |
          echo "Last heartbeat: $(date)" > heartbeat.txt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add heartbeat.txt
          git commit -m "Keep-alive nudge [skip ci]" || echo "No changes to commit"
          git push
    driver.quit()
