name: Streamlit Keep Alive

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  # Allows you to manually run this from the "Actions" tab
  workflow_dispatch: 

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: "Keep Alive Nudge"
        run: |
          date > keep_alive.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add keep_alive.txt
          git commit -m "Keep-alive heartbeat [skip ci]"
          git push
