name: Keep Jomar App Awake

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Ping
        # This version ignores the redirect loop and avoids Exit Code 47
        run: curl -sL --max-redirs 3 https://jomar-submittal-builder.streamlit.app/ || true
