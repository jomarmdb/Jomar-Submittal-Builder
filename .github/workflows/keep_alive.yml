name: Keep Jomar App Awake

on:
  schedule:
    - cron: '0 */3 * * *' # Every 3 hours
  workflow_dispatch: 

env:
  # This tells GitHub to use the new engine, clearing the main deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2 # Specifically use the version that supports Node 24

      - name: Set up Python
        uses: actions/setup-python@v5.4.0 # Specifically use the version that supports Node 24
        with:
          python-version: '3.11'

      - name: Install Selenium
        run: pip install selenium webdriver-manager

      - name: Run Browser Visit
        run: |
          python - <<EOF
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          import time

          options = Options()
          options.add_argument("--headless=new")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          # Pretend to be a real Chrome browser on Windows
          options.add_argument("user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36")

          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
          
          print("Visiting Jomar Submittal Builder...")
          driver.get("https://jomar-submittal-builder.streamlit.app/")
          
          # Wait 15 seconds to ensure the 'Wake Up' trigger is sent to Streamlit
          time.sleep(15)
          
          print("Current Page Title:", driver.title)
          driver.quit()
          EOF
