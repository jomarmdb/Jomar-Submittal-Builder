name: Keep Jomar App Awake

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          echo "Waking up Streamlit app..."

          curl -I https://jomar-submittal-builder.streamlit.app/

          echo "Done!"
