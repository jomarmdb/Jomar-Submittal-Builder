name: Keep Jomar App Awake

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: 

# We remove the global FORCE variable because it often triggers 
# the warning you're seeing by "forcing" a mismatch.
# Instead, we let GitHub handle the compatibility layer automatically.

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # We don't need extra flags here; GitHub will run this 
        # in a compatibility mode that is quieter.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Selenium
        run: pip install selenium webdriver-manager

      - name: Run Browser Visit
        run: |
          python - <<EOF
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          import time

          options = Options()
          options.add_argument("--headless=new")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36")

          service = Service(ChromeDriverManager().install())
          driver = webdriver.Chrome(service=service, options=options)

          try:
              driver.get("https://jomar-submittal-builder.streamlit.app/")
              time.sleep(15) 
              driver.execute_script("window.scrollTo(0, 500);")
              time.sleep(5)
              print(f"Successfully visited Jomar App: {driver.title}")
          finally:
              driver.quit()
          EOF
