name: Keep Jomar App Awake

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit App
        run: |
          python - <<EOF
          import requests
          import time

          url = "https://jomar-submittal-builder.streamlit.app/"

          print("Sending request to Streamlit app...")
          
          response = requests.get(
              url,
              headers={
                  "User-Agent": "Mozilla/5.0"
              },
              timeout=30
          )

          print("Status Code:", response.status_code)
          print("Response Length:", len(response.text))

          # Wait a few seconds so Streamlit finishes waking
          time.sleep(10)

          print("Done!")
          EOF
